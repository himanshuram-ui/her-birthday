<!DOCTYPE html>
<html>
<head>
<title>Surprise 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* Background */
.bg-blur{
    position:fixed;
    inset:0;
    background:url('second background.jpg') center center/cover no-repeat;
    z-index:-1;
}

/* Intro Screen */
#intro{
    position:fixed;
    inset:0;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    z-index:100;
    transition:1s;
}

/* Name */
.name{
    position:absolute;
    top:35px;
    width:100%;
    text-align:center;
    font-size:32px;
    color:#ff5c8a;
    font-weight:bold;
    text-shadow:0 0 10px rgba(255,92,138,.5);
    opacity:0;
    transition:1s;
    z-index:10;
}

.name.show{
    opacity:1;
}

/* Video Square */
.video-box{
    position:absolute;
    top:54%;
    left:50%;
    transform:translate(-50%,-50%);
    width:min(82vw,420px);
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.18);
}

.video-box video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Dark Overlay */
.overlay-dark{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.45),
        rgba(0,0,0,.1)
    );
}

/* Sound Hint */
.unmute-hint{
    display:none;
    position:absolute;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.7);
    color:white;
    padding:8px 15px;
    border-radius:30px;
    font-size:13px;
    cursor:pointer;
}

/* Message */
.message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    background:rgba(0,0,0,.55);
    color:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    opacity:0;
    transition:1s;
}

.message.show{
    opacity:1;
}

/* Floating Hearts */
.heart{
    position:fixed;
    bottom:-50px;
    color:#ff5c8a;
    animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="intro">Tap to Begin 💌</div>

<div class="name">SIMI</div>

<div class="bg-blur"></div>

<div class="video-box">

   <video id="bgvideo" playsinline autoplay muted loop>
    <source src="Video2026.mp4" type="video/mp4">
</video>
    <div class="overlay-dark"></div>

    <div class="unmute-hint" id="hint">
        🔊 Tap for sound
    </div>

    <div class="message" id="text">
        <p id="typing"></p>
    </div>

</div>

<script>

const video = document.getElementById("bgVideo");
const textBox = document.getElementById("text");
const typing = document.getElementById("typing");
const hint = document.getElementById("hint");

const message = `Happy Birthday, SIMI 🎂
I hope your smile stays just as bright forever.
May you become a successful NDA candidate.

This is a small gift from me ❤️
Stay happy, stay blessed ✨`;

let index = 0;
let started = false;

document.body.addEventListener("click", () => {

    if(started) return;

    started = true;

    document.getElementById("intro").style.opacity = "0";

    setTimeout(()=>{
        document.getElementById("intro").style.display="none";
    },1000);

    document.querySelector(".name").classList.add("show");

    video.muted = false;

    video.play()
    .then(()=>{
        hint.style.display="none";
    })
    .catch(()=>{
        video.muted=true;
        video.play();
        hint.style.display="block";
    });

},{once:true});

hint.addEventListener("click",(e)=>{
    e.stopPropagation();
    video.muted=false;
    hint.style.display="none";
});

function typeText(){

    if(index < message.length){

        const char = message.charAt(index);

        typing.innerHTML +=
        char === "\n" ? "<br>" : char;

        index++;

        setTimeout(typeText,40);
    }
}

setInterval(()=>{

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    (15 + Math.random()*15) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);

},500);

video.onended = ()=>{

    textBox.classList.add("show");

    typing.innerHTML="";

    index=0;

    typeText();

    setTimeout(()=>{

        textBox.classList.remove("show");

        video.currentTime=0;

        video.play();

    },12000);
};

</script>

</body>
</html>
